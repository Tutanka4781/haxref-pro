<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fondo -->
  <rect width="512" height="512" rx="80" fill="#050505"/>
  <!-- Glow exterior -->
  <rect width="512" height="512" rx="80" fill="url(#glow)" opacity="0.6"/>
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#050505" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Texto HR -->
  <text x="256" y="300" font-family="Arial Black, sans-serif" font-size="220" font-weight="900"
    text-anchor="middle" fill="#c084fc"
    filter="url(#shadow)">HR</text>
  <!-- Línea inferior decorativa -->
  <rect x="156" y="340" width="200" height="6" rx="3" fill="#7c3aed" opacity="0.7"/>
  <!-- Texto PRO -->
  <text x="256" y="400" font-family="Arial, sans-serif" font-size="72" font-weight="700"
    letter-spacing="24" text-anchor="middle" fill="#5a3a7a">PRO</text>
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#9d00ff" flood-opacity="0.8"/>
    </filter>
  </defs>
</svg>
